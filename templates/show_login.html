{% extends "base.html" %}

{% block title %}Log In - ClimaSense{% endblock %}

{% block extra_css %}
<style>
    /* Night / Clear Theme - 3D */
    .layer-back {
        background: linear-gradient(to bottom, #0a192f, #020c1b);
    }
    .layer-mid {
        background: radial-gradient(circle at 50% 50%, rgba(100,255,218,0.05), transparent 70%);
        animation: slowDrift 20s infinite alternate ease-in-out;
    }
    
    .orb-star {
        background: rgba(100, 255, 218, 0.8);
        box-shadow: 0 0 20px rgba(100,255,218,0.6);
        animation: floatOrb 10s infinite alternate ease-in-out;
    }
    .orb-star-1 { width: 10px; height: 10px; top: 20%; left: 30%; transform: translateZ(-200px); }
    .orb-star-2 { width: 15px; height: 15px; top: 60%; left: 70%; transform: translateZ(-150px); animation-delay: -2s; }
    .orb-star-3 { width: 8px; height: 8px; top: 40%; left: 80%; transform: translateZ(-250px); animation-delay: -5s; }
    
    @keyframes slowDrift {
        0% { transform: translateZ(-300px) scale(1.2) translateX(-2%); }
        100% { transform: translateZ(-300px) scale(1.2) translateX(2%); }
    }
    @keyframes floatOrb {
        0% { transform: translateY(0) rotate3d(1, 1, 0, 0deg); }
        100% { transform: translateY(-50px) rotate3d(1, 1, 0, 180deg); }
    }
    
    .auth-card {
        transform-style: preserve-3d;
        background: linear-gradient(145deg, rgba(10, 25, 47, 0.9), rgba(2, 12, 27, 0.9));
        border: 1px solid rgba(100, 255, 218, 0.2);
        box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        padding: 2rem;
        border-radius: 15px;
        width: 100%;
        max-width: 400px;
        transition: transform 0.1s; /* smooth mouse tracking */
    }
    
    .form-input {
        background: rgba(2, 12, 27, 0.7);
        color: #e6f1ff;
        border: 1px solid rgba(100, 255, 218, 0.3);
    }
    .form-input:focus { border-color: #64ffda; outline: none; }
    .auth-btn { background: #64ffda; color: #020c1b; }
</style>
{% endblock %}

{% block scene_orbs %}
<div class="orb orb-star orb-star-1"></div>
<div class="orb orb-star orb-star-2"></div>
<div class="orb orb-star orb-star-3"></div>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card glass">
        <h2 class="auth-title">Welcome Back</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-input" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" required>
            </div>
            <div id="login-error" class="error-msg text-danger hidden mt-2"></div>
            <button type="submit" class="auth-btn mt-4">Log In</button>
        </form>
        <a href="{{ url_for('auth.signup') }}" class="auth-btn-secondary">Don't have an account? Sign up</a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    const err = document.getElementById('login-error');
    err.classList.add('hidden');
    
    try {
        const res = await fetch('/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        const data = await res.json();
        if (data.success) {
            window.location.href = '/index';
        } else {
            err.textContent = data.message || 'Login failed';
            err.classList.remove('hidden');
        }
    } catch(e) {
        err.textContent = 'Server error';
        err.classList.remove('hidden');
    }
});
</script>
{% endblock %}
