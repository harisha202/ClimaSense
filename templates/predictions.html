{% extends "base.html" %}

{% block title %}AI Predictions - ClimaSense{% endblock %}

{% block extra_css %}
<style>
    /* AI Neural Network Theme - 3D */
    .layer-back {
        background: radial-gradient(circle at center, #0a192f, #020c1b);
    }
    
    .layer-mid {
        background-image: radial-gradient(circle at 10% 20%, rgba(100,255,218,0.2) 2px, transparent 3px),
                          radial-gradient(circle at 80% 30%, rgba(100,255,218,0.2) 2px, transparent 3px),
                          radial-gradient(circle at 50% 80%, rgba(100,255,218,0.2) 2px, transparent 3px);
        background-size: 100px 100px;
        animation: aiDrift 15s infinite alternate ease-in-out;
        transform: translateZ(-300px) scale(1.5);
    }
    
    .layer-front {
        background-image: linear-gradient(rgba(100,255,218,0.05) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(100,255,218,0.05) 1px, transparent 1px);
        background-size: 50px 50px;
        animation: gridPulse 4s infinite alternate ease-in-out;
        transform: translateZ(-100px) scale(1.2) rotateX(20deg);
        transform-origin: bottom center;
    }
    
    .orb { display: none; }
    
    @keyframes aiDrift {
        0% { transform: translateZ(-300px) scale(1.5) translateX(-2%); }
        100% { transform: translateZ(-300px) scale(1.5) translateX(2%); }
    }
    
    @keyframes gridPulse {
        0% { opacity: 0.3; transform: translateZ(-100px) scale(1.2) rotateX(20deg) translateY(0); }
        100% { opacity: 0.7; transform: translateZ(-100px) scale(1.2) rotateX(20deg) translateY(20px); }
    }

    .prediction-panel {
        transform-style: preserve-3d;
        background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
        box-shadow: 0 10px 30px rgba(0,0,0,0.2), inset 0 0 20px rgba(255,255,255,0.5);
        border: 1px solid rgba(255,255,255,0.8);
        padding: 2rem;
        border-radius: var(--border-radius-lg);
        backdrop-filter: blur(15px);
        transition: transform 0.1s;
        color: #121212;
    }
    
    .prediction-panel * {
        color: #121212 !important;
    }
</style>
{% endblock %}

{% block content %}
<div style="max-width:1000px; margin: 0 auto; padding: 2rem;">
    <div class="prediction-panel" id="main-prediction-panel">
        
        <!-- Animated 3D Date/Time -->
        <div id="datetime-3d" style="text-align: center; margin-bottom: 2rem; font-size: 1.5rem; font-weight: bold; transform: translateZ(40px);"></div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem; transform: translateZ(20px);">
            <h2>AI Climate Predictions</h2>
            <div style="display:flex; gap:1rem;">
                <input type="text" id="pred-city" class="search-input" placeholder="Enter city...">
                <button id="load-pred-btn" class="search-btn">Predict</button>
            </div>
        </div>
        
        <div id="pred-loading" class="hidden" style="text-align:center; padding: 2rem; transform: translateZ(10px);">
            <i class="fa-solid fa-microchip fa-spin fa-3x"></i>
            <p class="mt-2">AI is analyzing climate data...</p>
        </div>

        <div class="hidden" id="prediction-results" style="transform: translateZ(15px);">
            <hr style="border-color: rgba(0,0,0,0.1); margin-bottom: 2rem;">
            <h3 id="pred-title" style="text-align:center; margin-bottom: 2rem;"></h3>
            
            <div style="position: relative; height:350px; width:100%; margin-bottom: 2rem; background: rgba(255,255,255,0.5); border-radius: 10px; padding: 1rem;">
                <canvas id="prediction-canvas"></canvas>
            </div>
            
            <div class="alert-banner" id="ai-insight-banner" style="background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(240,240,240,0.9)); border: 1px solid rgba(0,0,0,0.1); text-align: left; padding: 1.5rem;">
                <!-- AI insight goes here -->
            </div>
        </div>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// 3D Animated Date Time
function updateDateTime() {
    const now = new Date();
    const dtOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
    document.getElementById('datetime-3d').textContent = now.toLocaleDateString('en-US', dtOptions);
}
setInterval(updateDateTime, 1000);
updateDateTime();

let predChart = null;

document.getElementById('load-pred-btn').addEventListener('click', async () => {
    await fetchPrediction();
});

document.getElementById('pred-city').addEventListener('keypress', async (e) => {
    if (e.key === 'Enter') {
        await fetchPrediction();
    }
});

async function fetchPrediction() {
    const city = document.getElementById('pred-city').value.trim();
    if(!city) return;
    
    document.getElementById('prediction-results').classList.add('hidden');
    document.getElementById('pred-loading').classList.remove('hidden');
    
    try {
        const res = await fetch(`/api/predictions/${encodeURIComponent(city)}`);
        const data = await res.json();
        
        document.getElementById('pred-loading').classList.add('hidden');
        
        if(data.success) {
            document.getElementById('prediction-results').classList.remove('hidden');
            document.getElementById('pred-title').textContent = `48-Hour Forecast for ${data.city}`;
            document.getElementById('ai-insight-banner').innerHTML = `<i class="fa-solid fa-robot" style="margin-right: 10px;"></i> <strong>AI Insight:</strong> ${data.prediction.ai_insight}`;
            
            renderPredictionChart(data.prediction);
        } else {
            alert(data.message || 'Error fetching prediction');
        }
    } catch(e) {
        console.error(e);
        document.getElementById('pred-loading').classList.add('hidden');
    }
}

function renderPredictionChart(pred) {
    const ctx = document.getElementById('prediction-canvas').getContext('2d');
    
    if(predChart) {
        predChart.destroy();
    }
    
    const textColor = '#121212';
    const gridColor = 'rgba(0,0,0,0.1)';
    
    let tempUnit = '°C';
    let tToday = pred.today.temp;
    let tTom = pred.tomorrow.temp;
    
    const unitBtn = document.getElementById('unit-toggle');
    if(unitBtn && unitBtn.textContent === '°F') {
        tempUnit = '°F';
        tToday = (tToday * 9/5) + 32;
        tTom = (tTom * 9/5) + 32;
    }
    
    predChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Today', 'Tomorrow (Predicted)'],
            datasets: [{
                label: `Temperature (${tempUnit})`,
                data: [tToday, tTom],
                backgroundColor: ['rgba(52, 152, 219, 0.6)', 'rgba(46, 204, 113, 0.6)'],
                borderColor: ['rgba(52, 152, 219, 1)', 'rgba(46, 204, 113, 1)'],
                borderWidth: 1,
                borderRadius: 5
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: false,
                    grid: { color: gridColor },
                    ticks: { color: textColor }
                },
                x: {
                    grid: { display: false },
                    ticks: { color: textColor, font: { size: 14 } }
                }
            },
            plugins: {
                legend: { labels: { color: textColor } }
            }
        }
    });
}

// Ensure cards on this page tilt
document.addEventListener('mousemove', (e) => {
    const cards = document.querySelectorAll('.prediction-panel');
    if (cards.length === 0) return;
    
    const x = (window.innerWidth / 2 - e.pageX) / 50;
    const y = (window.innerHeight / 2 - e.pageY) / 50;
    
    cards.forEach(card => {
        card.style.transform = `translateZ(20px) rotateY(${x}deg) rotateX(${y}deg)`;
    });
});
</script>
{% endblock %}
